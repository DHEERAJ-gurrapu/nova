<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova OS</title>

    <link rel="stylesheet" href="face.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="hud">

    <!-- Top Left -->
    <div class="logo">
        <h2>NOVA OS</h2>
        <p>v1.0</p>
    </div>

    <!-- Top Right -->
    <div class="clock">

        <div id="time">00:00:00</div>

        <div id="date">Loading...</div>

    </div>

    <!-- Left Panel -->

    <div class="left-panel">

        <h3>SYSTEM</h3>

        <div class="item online">● ONLINE</div>

        <div class="item">● MICROPHONE</div>

        <div class="item">● MEMORY</div>

        <div class="item">● GROQ AI</div>

    </div>

    <!-- Right Panel -->

    <div class="right-panel">

        <h3>STATUS</h3>

        <div id="status">STARTING...</div>

    </div>

    <!-- Center -->

    <div class="center">

        <div class="ring ring1"></div>

        <div class="ring ring2"></div>

        <div class="ring ring3"></div>

        <div class="ring ring4"></div>

        <div class="ring ring5"></div>

        <div class="nova">
            Nova
        </div>

    </div>

    <!-- Bottom Left -->

    <div class="equalizer">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- Bottom Right -->

    <div class="power">

        <div>POWER LEVEL</div>

        <h1 id="power">100%</h1>

        <div class="power-bar">

            <div class="fill"></div>

        </div>

    </div>

</div>

<script src="face.js"></script>

</body>

</html>
